<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCA-F Practice Quiz | Personalised for Huiyan</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #232734;
            --border: #2d3142;
            --text: #e4e4e7;
            --text-muted: #9ca3af;
            --accent: #c084fc;
            --accent-dim: rgba(192, 132, 252, 0.15);
            --green: #4ade80;
            --green-dim: rgba(74, 222, 128, 0.15);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.15);
            --blue: #60a5fa;
            --blue-dim: rgba(96, 165, 250, 0.15);
            --rose: #fb7185;
            --rose-dim: rgba(251, 113, 133, 0.15);
            --cyan: #22d3ee;
            --cyan-dim: rgba(34, 211, 238, 0.15);
            --nav-height: 60px;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-top: var(--nav-height);
            padding-bottom: 80px; /* floating bottom bar */
        }

        /* ═══════════════════════════════════════
           STICKY NAV BAR
        ═══════════════════════════════════════ */
        .sticky-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            z-index: 1000;
            background: rgba(26, 29, 39, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 1rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .nav-mascot-wrap {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .nav-title {
            font-size: 0.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        /* Domain filter buttons in nav */
        .nav-filters {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex: 1;
            justify-content: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .nav-filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 0.3rem 0.65rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        /* Compact score display in nav */
        .nav-scores {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .nav-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.1;
        }

        .nav-score-num {
            font-size: 1rem;
            font-weight: 700;
        }

        .nav-score-label {
            font-size: 0.58rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .nav-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .nav-title { display: none; }
            .nav-scores { gap: 0.5rem; }
            .nav-score-num { font-size: 0.85rem; }
        }

        @media (max-width: 520px) {
            .filter-btn { font-size: 0.65rem; padding: 0.25rem 0.45rem; }
        }

            opacity: 0;
            transform: translateX(-40px);

            opacity: 0;
            transform: translateX(40px);
        }

            from { opacity: 0; transform: translateX(30px); }

            font-size: 0.75rem;
            font-weight: 700;

            border: 1px solid var(--border);

            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;

        .question-text {
            padding: 0 1.5rem 1rem;
            font-size: 0.98rem;
            font-weight: 500;
        }

        .options {
            padding: 0 1.5rem 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.88rem;

            width: 24px; height: 24px;

            align-items: center;
            justify-content: center;

            font-weight: 700;

            margin-top: 0.5rem;

           FLOATING BOTTOM BAR
        ═══════════════════════════════════════ */

            bottom: 0;
            left: 0;

            padding: 0.5rem 1.1rem;

            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;

        .btn-primary { background: var(--accent); color: #000; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);

        .btn-outline:hover { border-color: var(--accent); }

        /* History panel */
        .history-section {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;

            width: 60px;
            height: 60px;

            align-items: center;

// STATE & STORAGE
// ═══════════════════════════════════════════
const STORAGE_KEY = 'ccaf-quiz-history';
let answered = {};
let currentFilter = 'all';
let currentIndex = 0; // index within filtered list
let reactionTimer = null;

function getFilteredQuestions() {
    return currentFilter === 'all'
        ? questions
        : questions.filter(q => q.domain === currentFilter);
}

function getHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
}
function saveHistory(history) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

// ═══════════════════════════════════════════
// SCORING HELPERS
// ═══════════════════════════════════════════
function computeScores(answeredMap) {
    const domains = ['D1','D2','D3','D4','D5'];
    const domainScores = {};
    let totalCorrect = 0, totalAnswered = 0, totalWrong = 0;

    domains.forEach(d => { domainScores[d] = { correct: 0, total: 0 }; });

    Object.entries(answeredMap).forEach(([qId, ans]) => {
        if (ans === -1) return;
        const q = questions.find(q => q.id === parseInt(qId));
        if (!q) return;
        totalAnswered++;
        domainScores[q.domain].total++;
        if (ans === q.correct) {
            totalCorrect++;
            domainScores[q.domain].correct++;
        } else {
            totalWrong++;
        }
    });

    const wrongQuestions = [];
    Object.entries(answeredMap).forEach(([qId, ans]) => {
        if (ans === -1) return;
        const q = questions.find(q => q.id === parseInt(qId));
        if (q && ans !== q.correct) {
            wrongQuestions.push({ id: q.id, domain: q.domain, question: q.question.substring(0,80)+'...' });
        }
    });

    return {
        totalCorrect, totalWrong, totalAnswered,
        percent: totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0,
        domainScores, wrongQuestions
    };
}

// ═══════════════════════════════════════════
// SAVE ATTEMPT
// ═══════════════════════════════════════════
function saveAttempt() {
    const realAnswers = Object.fromEntries(
        Object.entries(answered).filter(([k,v]) => v !== -1)
    );
    if (Object.keys(realAnswers).length === 0) {
        alert('Answer at least one question before saving!');
        return;
    }

    const scores = computeScores(realAnswers);
    const history = getHistory();
    const attempt = {
        id: history.length + 1,
        date: new Date().toISOString(),
        dateFormatted: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }),
        questionsAnswered: scores.totalAnswered,
        correct: scores.totalCorrect,
        wrong: scores.totalWrong,
        percent: scores.percent,
        domainScores: scores.domainScores,
        wrongQuestions: scores.wrongQuestions,
        label: history.length === 0 ? 'Baseline (pre-study)' : `Attempt ${history.length + 1}`
    };

    history.push(attempt);
    saveHistory(history);

    // Visual feedback on Save button
    const btn = document.querySelector('.btn-primary');
    const origText = btn.textContent;
    btn.textContent = 'Saved!';
    btn.style.background = 'var(--green)';
    setTimeout(() => { btn.textContent = origText; btn.style.background = 'var(--accent)'; }, 2000);

    document.getElementById('historySection').style.display = 'block';
    renderHistory();
}

    let html = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:0.8rem;">
        <thead><tr style="border-bottom:2px solid var(--border);text-align:left;">
            <th style="padding:0.6rem;">Attempt</th>
            <th style="padding:0.6rem;">Date</th>
            <th style="padding:0.6rem;">Answered</th>
            <th style="padding:0.6rem;">Score</th>
            <th style="padding:0.6rem;">D1</th>
            <th style="padding:0.6rem;">D2</th>
            <th style="padding:0.6rem;">D3</th>
            <th style="padding:0.6rem;">D4</th>
            <th style="padding:0.6rem;">D5</th>
        </tr></thead><tbody>`;

    history.forEach(a => {
        const pctColor = a.percent >= 80 ? 'var(--green)' : a.percent >= 60 ? 'var(--amber)' : 'var(--rose)';
        const domainPct = (d) => {
            const ds = a.domainScores[d];
            if (!ds || ds.total === 0) return '<span style="color:var(--text-muted);">-</span>';
            const p = Math.round(ds.correct / ds.total * 100);
            const c = p >= 80 ? 'var(--green)' : p >= 60 ? 'var(--amber)' : 'var(--rose)';
            return `<span style="color:${c};font-weight:600;">${p}%</span><span style="color:var(--text-muted);font-size:0.7rem;"> (${ds.correct}/${ds.total})</span>`;
        };

        html += `<tr style="border-bottom:1px solid var(--border);">
            <td style="padding:0.6rem;font-weight:600;">${a.label}</td>
            <td style="padding:0.6rem;color:var(--text-muted);">${a.dateFormatted}</td>
            <td style="padding:0.6rem;">${a.questionsAnswered}/30</td>
            <td style="padding:0.6rem;"><span style="color:${pctColor};font-weight:700;font-size:1rem;">${a.percent}%</span></td>
            <td style="padding:0.6rem;">${domainPct('D1')}</td>
            <td style="padding:0.6rem;">${domainPct('D2')}</td>
            <td style="padding:0.6rem;">${domainPct('D3')}</td>
            <td style="padding:0.6rem;">${domainPct('D4')}</td>
            <td style="padding:0.6rem;">${domainPct('D5')}</td>
        </tr>`;
    });
    html += '</tbody></table></div>';

    if (history.length >= 2) {
        const first = history[0];
        const last = history[history.length - 1];
        const delta = last.percent - first.percent;
        const deltaColor = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--rose)' : 'var(--text-muted)';
        const deltaIcon = delta > 0 ? '&#9650;' : delta < 0 ? '&#9660;' : '&#9644;';
        html += `<div style="margin-top:1rem;padding:0.8rem 1rem;background:var(--surface-2);border-radius:8px;font-size:0.85rem;">
            <strong>Progress:</strong> <span style="color:${deltaColor};font-weight:700;">${deltaIcon} ${delta > 0 ? '+' : ''}${delta}%</span> from baseline to latest attempt
        </div>`;
    }

    const latest = history[history.length - 1];
    if (latest.wrongQuestions && latest.wrongQuestions.length > 0) {
        html += `<div style="margin-top:1rem;padding:1rem;background:var(--rose-dim);border-radius:8px;border:1px solid rgba(251,113,133,0.3);">
            <strong style="color:var(--rose);">Weak spots (latest attempt):</strong>
            <ul style="margin-top:0.5rem;padding-left:1.2rem;font-size:0.8rem;">`;
        latest.wrongQuestions.forEach(wq => {
            html += `<li style="margin-bottom:0.3rem;"><span style="color:var(--text-muted);">[${wq.domain}]</span> Q${wq.id}: ${wq.question}</li>`;
        });
        html += '</ul></div>';
    }

    const weakDomains = [];
    ['D1','D2','D3','D4','D5'].forEach(d => {
        const ds = latest.domainScores[d];
        if (ds && ds.total > 0 && (ds.correct / ds.total) < 0.75) {
            weakDomains.push(d);
        }
    });
    if (weakDomains.length > 0) {
        const domainNames = { D1:'Agentic Architecture', D2:'Tool Design & MCP', D3:'Claude Code Config', D4:'Prompt Engineering', D5:'Context Management' };
        html += `<div style="margin-top:1rem;padding:1rem;background:var(--amber-dim);border-radius:8px;border:1px solid rgba(251,191,36,0.3);">
            <strong style="color:var(--amber);">Study plan focus:</strong>
            <span style="font-size:0.85rem;"> Prioritise these domains:</span>
            <ul style="margin-top:0.5rem;padding-left:1.2rem;font-size:0.85rem;">`;
        weakDomains.forEach(d => {
            html += `<li><strong>${d}: ${domainNames[d]}</strong> (below 75%)</li>`;
        });
        html += '</ul></div>';
    }

    container.innerHTML = html;
}

// ═══════════════════════════════════════════
// EXPORT & UTILITY
// ═══════════════════════════════════════════
function exportProgress() {
    const history = getHistory();
    if (history.length === 0) { alert('No attempts to export yet!'); return; }

    const exportData = {
        exportDate: new Date().toISOString(),
        examTarget: 'CCA-F (Claude Certified Architect — Foundations)',
        candidate: 'Huiyan Wan',
        totalAttempts: history.length,
        latestScore: history[history.length - 1].percent + '%',
        baselineScore: history[0].percent + '%',
        improvement: (history[history.length - 1].percent - history[0].percent) + '%',
        attempts: history
    };

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ccaf-progress-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function toggleHistory() {
    const panel = document.getElementById('historySection');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        renderHistory();
    } else {
        panel.style.display = 'none';
    }
}

// ═══════════════════════════════════════════
// MASCOT REACTIONS
// ═══════════════════════════════════════════
function triggerReaction(type) {
    // type: 'neutral' | 'happy' | 'sad'
    const cat = document.getElementById('reactionCat');
    if (!cat) return;

    if (reactionTimer) clearTimeout(reactionTimer);

    cat.className = 'pixel-cat-react ' + type + ' visible';

    if (type !== 'neutral') {
        reactionTimer = setTimeout(() => {
            cat.classList.remove('visible');
            setTimeout(() => {
                cat.className = 'pixel-cat-react neutral';
            }, 300);
        }, 1500);
    }
}

// ═══════════════════════════════════════════
// RENDER SINGLE FLASHCARD
// ═══════════════════════════════════════════
function renderCard(direction) {
    const filtered = getFilteredQuestions();
    const wrap = document.getElementById('questionCardWrap');

    if (filtered.length === 0) {
        wrap.innerHTML = `<div class="question-card" style="padding:2rem;text-align:center;color:var(--text-muted);">No questions match this filter.</div>`;
        document.getElementById('progressLabel').textContent = 'No questions';
        document.getElementById('progressDomainLabel').textContent = '';
        document.getElementById('progressBarFill').style.width = '0%';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
        return;
    }

    // Clamp index
    if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;
    if (currentIndex < 0) currentIndex = 0;

    const q = filtered[currentIndex];
    const letters = ['A', 'B', 'C', 'D'];
    const isAnswered = answered[q.id] !== undefined;
    const isCorrect = isAnswered && answered[q.id] === q.correct;

    // Options HTML
    const optionsHtml = q.options.map((opt, i) => {
        let cls = 'option';
        if (isAnswered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct-answer';
            if (i === answered[q.id] && i !== q.correct) cls += ' wrong-answer';
        }
        return `<div class="${cls}" onclick="selectAnswer(${q.id}, ${i})">
            <div class="option-letter">${letters[i]}</div>
            <div>${opt}</div>
        </div>`;
    }).join('');

    // Explanation
    let expTitle = '';
    if (isAnswered) {
        if (answered[q.id] === -1) {
            expTitle = `<span style="color:var(--blue)">Answer: ${letters[q.correct]}</span>`;
        } else if (isCorrect) {
            expTitle = `<span style="color:var(--green)">&#10003; Correct</span>`;
        } else {
            expTitle = `<span style="color:var(--rose)">&#10007; Incorrect — Answer: ${letters[q.correct]}</span>`;
        }
    }

    const undoBtn = (isAnswered && answered[q.id] !== -1)
        ? `<button onclick="undoAnswer(${q.id})" style="font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:4px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);cursor:pointer;font-family:inherit;">Undo</button>`
        : '';

    const cardClass = `question-card ${isAnswered ? (isCorrect ? 'correct' : 'incorrect') : ''}`;

    const html = `
        <div class="${cardClass}" id="currentCard">
            <div class="question-header">
                <div class="q-num">Q${q.id}</div>
                <div class="question-meta">
                    <span class="q-tag" style="background:${q.domainBg};color:${q.domainColor};">${q.domain} (${q.weight})</span>
                    <span class="q-tag" style="background:var(--surface-2);color:var(--text-muted);">${q.scenario}</span>
                </div>
            </div>
            <div class="scenario-context">${q.context}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">${optionsHtml}</div>
            <div class="mascot-reaction-wrap">
                <div class="pixel-cat-react ${isAnswered ? (isCorrect ? 'happy visible' : 'sad visible') : 'neutral'}" id="reactionCat"></div>
            </div>
            <div class="explanation ${isAnswered ? 'show' : ''}">
                <div class="exp-title">
                    <span>${expTitle}</span>
                    ${undoBtn}
                </div>
                <div>${q.explanation}</div>
                <div class="personal-note"><strong>Your context:</strong> ${q.personalNote}</div>
            </div>
        </div>`;

    // Apply slide animation
    if (direction) {
        const outClass = direction === 'next' ? 'slide-out-left' : 'slide-out-right';
        const existing = document.getElementById('currentCard');
        if (existing) {
            existing.classList.add(outClass);
            setTimeout(() => {
                wrap.innerHTML = html;
                document.getElementById('currentCard').classList.add('slide-in');
                // Show correct reaction state immediately after render
                if (isAnswered && !isCorrect && answered[q.id] !== -1) {
                    triggerReaction('sad');
                } else if (isAnswered && isCorrect) {
                    triggerReaction('happy');
                }
            }, 200);
        } else {
            wrap.innerHTML = html;
        }
    } else {
        wrap.innerHTML = html;
        if (isAnswered && isCorrect) triggerReaction('happy');
        else if (isAnswered && !isCorrect && answered[q.id] !== -1) triggerReaction('sad');
    }

    // Update progress bar
    const totalFiltered = filtered.length;
    document.getElementById('progressLabel').textContent = `Question ${currentIndex + 1} of ${totalFiltered}`;
    document.getElementById('progressDomainLabel').textContent = q.domainName;
    document.getElementById('progressBarFill').style.width = `${((currentIndex + 1) / totalFiltered) * 100}%`;

    // Update nav buttons
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === totalFiltered - 1;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function navigate(delta) {
    const filtered = getFilteredQuestions();
    const newIndex = currentIndex + delta;
    if (newIndex < 0 || newIndex >= filtered.length) return;
    currentIndex = newIndex;
    renderCard(delta > 0 ? 'next' : 'prev');
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight') navigate(1);
    else if (e.key === 'ArrowLeft') navigate(-1);
});

// ═══════════════════════════════════════════
// ANSWER SELECTION
// ═══════════════════════════════════════════
function selectAnswer(qId, optIdx) {
    if (answered[qId] !== undefined) return;
    answered[qId] = optIdx;

    const q = questions.find(q => q.id === qId);
    const isCorrect = optIdx === q.correct;

    updateScore();
    renderCard(null); // re-render without transition

    if (isCorrect) {
        triggerReaction('happy');
    } else {
        triggerReaction('sad');
    }
}

function undoAnswer(qId) {
    delete answered[qId];
    updateScore();
    renderCard(null);
    triggerReaction('neutral');
}

// ═══════════════════════════════════════════
// FIX ATTEMPT ANSWER (utility)
// ═══════════════════════════════════════════
function fixAttemptAnswer(questionId, newAnswerIdx) {
    const history = getHistory();
    if (history.length === 0) { alert('No saved attempts to fix.'); return; }
    const latest = history[history.length - 1];
    const q = questions.find(q => q.id === questionId);
    if (!q) { alert('Question not found.'); return; }

    const wasWrong = (latest.wrongQuestions || []).some(wq => wq.id === questionId);
    const isNowCorrect = newAnswerIdx === q.correct;

    if (wasWrong && isNowCorrect) {
        latest.wrongQuestions = latest.wrongQuestions.filter(wq => wq.id !== questionId);
        latest.correct++;
        latest.wrong--;
        latest.domainScores[q.domain].correct++;
    } else if (!wasWrong && !isNowCorrect) {
        latest.wrongQuestions.push({ id: q.id, domain: q.domain, question: q.question.substring(0,80)+'...' });
        latest.correct--;
        latest.wrong++;
        latest.domainScores[q.domain].correct--;
    }

    latest.percent = Math.round(latest.correct / latest.questionsAnswered * 100);
    latest.label = latest.label + ' (Q' + questionId + ' corrected)';

    saveHistory(history);
    alert('Q' + questionId + ' corrected in attempt #' + latest.id + '. New score: ' + latest.percent + '%');
    renderHistory();
}

// ═══════════════════════════════════════════
// SCORE UPDATE
// ═══════════════════════════════════════════
function updateScore() {
    let correctCount = 0, wrongCount = 0;
    Object.entries(answered).forEach(([qId, ans]) => {
        if (ans === -1) return;
        const q = questions.find(q => q.id === parseInt(qId));
        if (q && ans === q.correct) correctCount++;
        else if (q) wrongCount++;
    });

    document.getElementById('scoreCorrect').textContent = correctCount;
    document.getElementById('scoreWrong').textContent = wrongCount;
    const pct = correctCount + wrongCount > 0
        ? Math.round(correctCount / (correctCount + wrongCount) * 100)
        : '--';
    const pctEl = document.getElementById('scorePercent');
    pctEl.textContent = pct + (pct === '--' ? '' : '%');
    pctEl.style.color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : pct === '--' ? 'var(--accent)' : 'var(--rose)';
}

// ═══════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════
function filterDomain(domain, btn) {
    currentFilter = domain;
    currentIndex = 0;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    renderCard(null);
}

// ═══════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════
function resetQuiz() {
    answered = {};
    currentIndex = 0;
    updateScore();
    renderCard(null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════
// REVEAL ALL
// ═══════════════════════════════════════════
function revealAll() {
    questions.forEach(q => {
        if (answered[q.id] === undefined) answered[q.id] = -1;
    });
    updateScore();
    renderCard(null);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderCard(null);
updateScore();
if (getHistory().length > 0) {
    document.getElementById('historySection').style.display = 'block';
    renderHistory();
}
</script>
